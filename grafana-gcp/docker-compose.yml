# 本机统一 Grafana（同时消费 5090 本机 Prometheus 与经 frp 隧道来的 g4-01 Prometheus）。
# network_mode: host——Grafana 直接绑 0.0.0.0:${GRAFANA_PORT}（局域网 IP 可访问），
# 且共享宿主 loopback，能直接读 127.0.0.1:${LOCAL_PROM_PORT}（本机 Prom）与 127.0.0.1:${G4_PROM_LOCAL_PORT}（隧道落地）。
# ⚠️ host 网络仅 Linux 有效；host 模式下 ports: 被忽略，端口由 GF_SERVER_HTTP_PORT 决定。
services:
  grafana:
    image: grafana/grafana:11.3.0
    container_name: ifa-grafana-gcp
    network_mode: host
    restart: unless-stopped
    environment:
      - GF_SERVER_HTTP_ADDR=0.0.0.0
      - GF_SERVER_HTTP_PORT=${GRAFANA_PORT:-3001}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      # 供数据源 provisioning 插值
      - LOCAL_PROM_PORT=${LOCAL_PROM_PORT:-9091}
      - G4_PROM_LOCAL_PORT=${G4_PROM_LOCAL_PORT:-29090}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ifa-grafana-gcp-data:/var/lib/grafana

volumes:
  ifa-grafana-gcp-data:
