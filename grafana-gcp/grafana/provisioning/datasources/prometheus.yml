# Grafana 数据源自动配置（统一视图：两台服务器各一个 Prometheus 数据源）。
# network_mode: host 下容器共享宿主 loopback，直接读 127.0.0.1 上的端口。
apiVersion: 1
datasources:
  # 数据源①：5090 本机 Prometheus（LocateAnything 观测栈）。默认 9091（9090 被 mihomo 占）
  - name: 5090 Prometheus (本机)
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://127.0.0.1:${LOCAL_PROM_PORT}
    isDefault: true
    editable: false
  # 数据源②：g4-01（算力，GCP）Prometheus，经 frp STCP 隧道落地。默认 29090
  - name: g4-01 Prometheus (算力)
    uid: g4-01-prometheus
    type: prometheus
    access: proxy
    url: http://127.0.0.1:${G4_PROM_LOCAL_PORT}
    isDefault: false
    editable: false
