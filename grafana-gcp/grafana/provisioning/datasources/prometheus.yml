# Grafana 数据源自动配置：指向 IAP 隧道在本机的落地端口。
# network_mode: host 下容器共享宿主 loopback，127.0.0.1:${LOCAL_PROM_PORT} 即隧道落地口，
# 隧道另一端是 GCP gpu-g4-01 上 loopback 的 Prometheus。
# ${LOCAL_PROM_PORT} 由 docker-compose 注入容器环境后被 Grafana 插值。
apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://127.0.0.1:${LOCAL_PROM_PORT}
    isDefault: true
    editable: true
