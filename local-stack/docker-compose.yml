# Odyss 全栈本地化冒烟栈：services + superadmin + 全部存储，局域网闭环运行。
# 第一性：拉起后不依赖任何公网访问——镜像离线导入、LLM 走本地 mock、
# 存储全部落本机命名卷（pg/minio/redis 数据在 volumes 里，容器重建不丢）。
name: odyss-local-stack

services:
  postgres:
    image: postgres:18.4
    container_name: odyss-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: odyss
      POSTGRES_PASSWORD: odyssadmin
      POSTGRES_DB: odyss_services
      TZ: Asia/Shanghai
    volumes:
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odyss -d odyss_services"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - odyss-local-net

  redis:
    image: valkey/valkey:9.1.0
    container_name: odyss-local-redis
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes", "--requirepass", "odyssadmin"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "odyssadmin", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - odyss-local-net

  minio:
    image: minio/minio:latest
    container_name: odyss-local-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: odyss
      MINIO_ROOT_PASSWORD: odyssadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - odyss-local-net

  minio-init:
    image: minio/mc:latest
    container_name: odyss-local-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 odyss odyssadmin
        mc mb --ignore-existing local/odyss-local
    networks:
      - odyss-local-net

  # mockllm 与服务共用同一镜像的第二入口：本地闭环里 LLM 全部走 mock。
  llm-mock:
    image: odyss-services:local
    container_name: odyss-local-llm-mock
    restart: unless-stopped
    entrypoint: ["/app/mockllm"]
    command: ["-addr", "8081", "-realtime-labels", "eating,eating,not_eating,not_eating,not_eating", "-fail-first-realtime=false"]
    networks:
      - odyss-local-net

  migrate:
    image: odyss-services:local
    container_name: odyss-local-migrate
    entrypoint: ["/app/odyss-migrate"]
    command: ["-config", "/app/runtime-config.yaml", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - odyss-local-net

  odyss-services:
    image: odyss-services:local
    container_name: odyss-local-services
    restart: unless-stopped
    # -workers=false 只跑 HTTP：outbox/realtime/delivery worker 依赖 inhouse preflight 等
    # 额外基建，本地闭环用不到；实时分析链路数据因此不会产生（页面显示为空属预期）。
    command: ["/app/odyss-services", "-config", "/app/runtime-config.yaml", "-workers=false"]
    ports:
      - "18090:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      llm-mock:
        condition: service_started
    networks:
      - odyss-local-net

  superadmin:
    image: nginx:alpine
    container_name: odyss-local-superadmin
    restart: unless-stopped
    ports:
      - "18091:80"
    volumes:
      - ./artifacts/superadmin-dist:/usr/share/nginx/html:ro
      - ./superadmin/superadmin.conf:/etc/nginx/conf.d/default.conf:ro
      - ./superadmin/superadmin-runtime-config.json:/usr/share/nginx/html/superadmin-runtime-config.json:ro
    depends_on:
      odyss-services:
        condition: service_started
    networks:
      - odyss-local-net

networks:
  odyss-local-net:
    name: odyss-local-network
    driver: bridge

volumes:
  pg-data:
    name: odyss-local-pg-data
  redis-data:
    name: odyss-local-redis-data
  minio-data:
    name: odyss-local-minio-data
